exp_name: "wss_N10k_lr1e-3_e250"

model:
    input_dim: 3
    output_dim: 3
    head_num: 8
    hidden_dim: 192
    res: true
    slice_num: 32
    layer_num: 8
    mlp_ratio: 1.5
    dropout: 0.1

training:
    input: "x_wss"
    target: "y_wss"
