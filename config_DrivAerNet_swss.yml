    batch_size: 1
    epochs: 250
    lr: 0.001
    scheduler_step: 50
    scheduler_gamma: 0.5
    max_grad_norm: 0.1
    num_workers: 1
    weight_decay: 0.00000
    test_only: 0  
    gpus: "0"
    seed: 42

dataload:
